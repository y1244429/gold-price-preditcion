<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金价格宏观因子预测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid rgba(255,215,0,0.3);
            margin-bottom: 30px;
        }
        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .score-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,165,0,0.05));
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }
        .score-value {
            font-size: 72px;
            font-weight: bold;
            color: #FFD700;
        }
        .score-label { color: #888; font-size: 14px; margin-top: 10px; }
        .sentiment {
            display: inline-block;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
        }
        .sentiment.bullish { background: rgba(0,208,132,0.2); color: #00d084; }
        .sentiment.bearish { background: rgba(255,71,87,0.2); color: #ff4757; }
        .sentiment.neutral { background: rgba(255,193,7,0.2); color: #ffc107; }
        
        .factors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .factor-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
        }
        .factor-card:hover {
            border-color: rgba(255,215,0,0.3);
            transform: translateY(-3px);
        }
        .factor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .factor-name { font-size: 16px; font-weight: 600; }
        .factor-weight {
            background: rgba(255,215,0,0.1);
            color: #FFD700;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        .factor-value {
            font-size: 28px;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 10px;
        }
        .factor-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            font-size: 13px;
            color: #888;
        }
        .factor-detail { text-align: center; }
        .factor-detail span { display: block; color: #fff; font-size: 16px; margin-top: 5px; }
        
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .progress-fill.positive { background: linear-gradient(90deg, #00d084, #00b894); }
        .progress-fill.negative { background: linear-gradient(90deg, #ff4757, #ee5a6f); }
        
        .prediction-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 20px;
            color: #FFD700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .price-comparison {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .price-box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .price-label { color: #888; font-size: 13px; margin-bottom: 8px; }
        .price-value { font-size: 28px; font-weight: bold; color: #FFD700; }
        .price-change { font-size: 14px; margin-top: 5px; }
        
        .chart-container {
            height: 350px;
            margin-top: 20px;
        }
        
        .btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,215,0,0.2);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .hidden { display: none; }
        
        .impact-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 10px;
        }
        .impact-tag.positive { background: rgba(0,208,132,0.2); color: #00d084; }
        .impact-tag.negative { background: rgba(255,71,87,0.2); color: #ff4757; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🪙 黄金价格宏观因子预测系统</h1>
            <p style="color:#888; margin-top:10px;">基于9个宏观因子的多维度评分与预测</p>
        </header>

        <button class="btn" onclick="loadData()">📊 获取宏观因子数据</button>

        <div id="loadingSection" class="loading hidden">
            <div class="spinner"></div>
            <p style="color:#888;">正在获取真实市场数据...</p>
        </div>

        <div id="contentSection" class="hidden">
            <!-- 总分卡片 -->
            <div class="score-card">
                <div class="score-label">宏观因子综合得分 (0-10)</div>
                <div class="score-value" id="totalScore">--</div>
                <div class="sentiment" id="sentiment">--</div>
                <p style="color:#666; margin-top:15px;">更新时间: <span id="updateTime">--</span></p>
            </div>

            <!-- 因子详情 -->
            <div class="factors-grid" id="factorsGrid">
                <!-- 动态生成 -->
            </div>

            <!-- 价格预测 -->
            <div class="prediction-section">
                <div class="section-title">📈 基于宏观因子的金价预测 (30天)</div>
                <div class="price-comparison">
                    <div class="price-box">
                        <div class="price-label">当前金价</div>
                        <div class="price-value" id="currentPrice">--</div>
                    </div>
                    <div class="price-box">
                        <div class="price-label">30天目标价</div>
                        <div class="price-value" id="targetPrice">--</div>
                        <div class="price-change" id="expectedReturn">--</div>
                    </div>
                    <div class="price-box">
                        <div class="price-label">预测区间</div>
                        <div class="price-value" id="priceRange">--</div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="predictionChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartInstance = null;

        async function loadData() {
            document.getElementById('loadingSection').classList.remove('hidden');
            document.getElementById('contentSection').classList.add('hidden');
            
            try {
                const response = await fetch('/api/macro-factors');
                const data = await response.json();
                
                updateUI(data);
                
                document.getElementById('loadingSection').classList.add('hidden');
                document.getElementById('contentSection').classList.remove('hidden');
            } catch (error) {
                console.error('加载数据失败:', error);
                alert('数据加载失败，请重试');
            }
        }

        function updateUI(data) {
            // 更新总分
            document.getElementById('totalScore').textContent = data.total_score.toFixed(2);
            document.getElementById('updateTime').textContent = data.update_time;
            
            // 更新情绪标签
            const sentimentEl = document.getElementById('sentiment');
            sentimentEl.textContent = data.sentiment;
            sentimentEl.className = 'sentiment';
            if (data.sentiment.includes('强烈看涨') || data.sentiment.includes('看涨')) {
                sentimentEl.classList.add('bullish');
            } else if (data.sentiment.includes('强烈看跌') || data.sentiment.includes('看跌')) {
                sentimentEl.classList.add('bearish');
            } else {
                sentimentEl.classList.add('neutral');
            }
            
            // 更新因子卡片
            const grid = document.getElementById('factorsGrid');
            grid.innerHTML = '';
            
            for (const [name, factor] of Object.entries(data.factors)) {
                const card = document.createElement('div');
                card.className = 'factor-card';
                
                const impactClass = factor.impact === 'positive' ? 'positive' : 'negative';
                const impactText = factor.impact === 'positive' ? '正向' : '负向';
                const trendIcon = factor.trend === 'up' ? '↗' : '↘';
                const trendColor = factor.trend === 'up' ? '#00d084' : '#ff4757';
                
                card.innerHTML = `
                    <div class="factor-header">
                        <div class="factor-name">
                            ${name}
                            <span class="impact-tag ${impactClass}">${impactText}</span>
                        </div>
                        <div class="factor-weight">权重 ${(factor.weight * 100).toFixed(0)}%</div>
                    </div>
                    <div class="factor-value">
                        ${typeof factor.raw_value === 'object' ? 
                            `${factor.raw_value.gold_silver || '--'} / ${factor.raw_value.copper_gold || '--'}` : 
                            factor.raw_value}
                    </div>
                    <div class="factor-details">
                        <div class="factor-detail">
                            原始得分
                            <span>${factor.base_score}</span>
                        </div>
                        <div class="factor-detail">
                            调整后
                            <span style="color: ${factor.adjusted_score > 5 ? '#00d084' : '#ff4757'}">${factor.adjusted_score}</span>
                        </div>
                        <div class="factor-detail">
                            加权得分
                            <span style="color: #FFD700">${factor.weighted_score}</span>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${factor.adjusted_score > 5 ? 'positive' : 'negative'}" 
                             style="width: ${factor.adjusted_score * 10}%"></div>
                    </div>
                    <div style="margin-top: 8px; font-size: 12px; color: #666;">
                        月度变化: <span style="color: ${factor.change_1m > 0 ? '#00d084' : '#ff4757'}">
                            ${factor.change_1m > 0 ? '+' : ''}${factor.change_1m}
                        </span>
                        <span style="margin-left: 15px; color: ${trendColor}">${trendIcon} ${factor.trend === 'up' ? '上升' : '下降'}</span>
                    </div>
                `;
                grid.appendChild(card);
            }
            
            // 更新预测
            const pred = data.prediction;
            document.getElementById('currentPrice').textContent = '$' + pred.current_price.toLocaleString();
            document.getElementById('targetPrice').textContent = '$' + pred.target_price.toLocaleString();
            
            const returnEl = document.getElementById('expectedReturn');
            returnEl.textContent = (pred.expected_return > 0 ? '+' : '') + pred.expected_return + '%';
            returnEl.style.color = pred.expected_return > 0 ? '#00d084' : '#ff4757';
            
            const minPrice = Math.min(...pred.predictions);
            const maxPrice = Math.max(...pred.predictions);
            document.getElementById('priceRange').textContent = '$' + minPrice.toFixed(0) + ' - $' + maxPrice.toFixed(0);
            
            // 绘制图表
            drawChart(pred.dates, pred.predictions, pred.current_price);
        }

        function drawChart(dates, predictions, currentPrice) {
            const ctx = document.getElementById('predictionChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }
            
            // 添加当前价格作为起点
            const allDates = ['当前', ...dates.filter((_, i) => i % 5 === 0)];
            const allPrices = [currentPrice, ...predictions.filter((_, i) => i % 5 === 0)];
            
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: allDates,
                    datasets: [{
                        label: '金价预测',
                        data: allPrices,
                        borderColor: '#FFD700',
                        backgroundColor: 'rgba(255,215,0,0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: '#FFD700'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#888' }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: {
                                color: '#888',
                                callback: function(value) {
                                    return '$' + value;
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
