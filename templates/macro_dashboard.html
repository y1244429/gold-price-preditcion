<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金价格宏观因子预测系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid rgba(255,215,0,0.3);
            margin-bottom: 30px;
        }
        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .score-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,165,0,0.05));
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
        }
        .score-value {
            font-size: 72px;
            font-weight: bold;
            color: #FFD700;
        }
        .score-label { color: #888; font-size: 14px; margin-top: 10px; }
        .sentiment {
            display: inline-block;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
        }
        .sentiment.bullish { background: rgba(0,208,132,0.2); color: #00d084; }
        .sentiment.bearish { background: rgba(255,71,87,0.2); color: #ff4757; }
        .sentiment.neutral { background: rgba(255,193,7,0.2); color: #ffc107; }
        
        .factors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .factor-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
        }
        .factor-card:hover {
            border-color: rgba(255,215,0,0.3);
            transform: translateY(-3px);
        }
        .factor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .factor-name { font-size: 16px; font-weight: 600; }
        .factor-weight {
            background: rgba(255,215,0,0.1);
            color: #FFD700;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        .factor-value {
            font-size: 28px;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 10px;
        }
        .factor-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            font-size: 13px;
            color: #888;
        }
        .factor-detail { text-align: center; }
        .factor-detail span { display: block; color: #fff; font-size: 16px; margin-top: 5px; }
        
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .progress-fill.positive { background: linear-gradient(90deg, #00d084, #00b894); }
        .progress-fill.negative { background: linear-gradient(90deg, #ff4757, #ee5a6f); }
        
        .prediction-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 20px;
            color: #FFD700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .price-comparison {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .price-box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .price-label { color: #888; font-size: 13px; margin-bottom: 8px; }
        .price-value { font-size: 28px; font-weight: bold; color: #FFD700; }
        .price-change { font-size: 14px; margin-top: 5px; }
        
        .chart-container {
            height: 350px;
            margin-top: 20px;
        }
        
        .btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px auto;
            display: inline-block;
        }
        .btn-secondary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            margin-left: 10px;
        }
        .btn-small {
            padding: 8px 20px;
            font-size: 14px;
        }
        .btn-reset {
            background: linear-gradient(135deg, #6c757d, #495057);
            color: #fff;
        }
        
        /* 权重调整面板 */
        .weight-panel {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
        }
        .weight-sliders {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .weight-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
        }
        .weight-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .weight-item-name {
            font-size: 14px;
            font-weight: 600;
        }
        .weight-item-value {
            background: rgba(255,215,0,0.2);
            color: #FFD700;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }
        .weight-slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            outline: none;
            -webkit-appearance: none;
        }
        .weight-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #FFD700;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        .weight-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #FFD700;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        .weight-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .weight-total {
            text-align: center;
            margin-top: 15px;
            font-size: 16px;
            color: #FFD700;
        }
        .weight-total.warning {
            color: #ff4757;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,215,0,0.2);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .hidden { display: none; }
        
        .impact-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 10px;
        }
        .impact-tag.positive { background: rgba(0,208,132,0.2); color: #00d084; }
        .impact-tag.negative { background: rgba(255,71,87,0.2); color: #ff4757; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🪙 黄金价格宏观因子预测系统</h1>
            <p style="color:#888; margin-top:10px;">基于9个宏观因子的多维度评分与预测</p>
        </header>

        <button class="btn" onclick="loadData()">📊 获取宏观因子数据</button>
        <button class="btn btn-secondary" onclick="toggleWeightPanel()">⚙️ 调整因子权重</button>

        <!-- 权重调整面板 -->
        <div id="weightPanel" class="weight-panel hidden">
            <div class="section-title">⚙️ 自定义因子权重</div>
            <div class="weight-sliders" id="weightSliders">
                <!-- 动态生成 -->
            </div>
            <div class="weight-actions">
                <button class="btn btn-small" onclick="applyCustomWeights()">✓ 应用权重</button>
                <button class="btn btn-small btn-reset" onclick="resetWeights()">↺ 重置默认</button>
            </div>
            <div class="weight-total" id="weightTotal">总计: 100%</div>
        </div>

        <div id="loadingSection" class="loading hidden">
            <div class="spinner"></div>
            <p style="color:#888;">正在获取真实市场数据...</p>
        </div>

        <div id="contentSection" class="hidden">
            <!-- 总分卡片 -->
            <div class="score-card">
                <div class="score-label">宏观因子综合得分 (0-10)</div>
                <div class="score-value" id="totalScore">--</div>
                <div class="sentiment" id="sentiment">--</div>
                <p style="color:#666; margin-top:15px;">更新时间: <span id="updateTime">--</span></p>
            </div>

            <!-- 因子详情 -->
            <div class="factors-grid" id="factorsGrid">
                <!-- 动态生成 -->
            </div>

            <!-- 价格预测 -->
            <div class="prediction-section">
                <div class="section-title">📈 基于宏观因子的金价预测 (30天)</div>
                <div style="text-align:center; color:#888; font-size:12px; margin-bottom:15px;">
                    数据来源: <span id="priceSource">--</span>
                </div>
                <div class="price-comparison">
                    <div class="price-box">
                        <div class="price-label">当前金价</div>
                        <div class="price-value" id="currentPrice">--</div>
                    </div>
                    <div class="price-box">
                        <div class="price-label">30天目标价</div>
                        <div class="price-value" id="targetPrice">--</div>
                        <div class="price-change" id="expectedReturn">--</div>
                    </div>
                    <div class="price-box">
                        <div class="price-label">预测区间</div>
                        <div class="price-value" id="priceRange">--</div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="predictionChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartInstance = null;
        let currentData = null;
        let defaultWeights = {};
        let customWeights = {};
        
        // 默认权重配置
        const DEFAULT_WEIGHTS = {
            '实际利率 (TIPS)': 0.30,
            '地缘政治风险 (GPR)': 0.20,
            '美元指数 (DXY)': 0.15,
            '美债收益率': 0.10,
            '黄金ETF持仓': 0.09,
            '通胀预期 (CPI)': 0.05,
            'VIX波动率': 0.05,
            '金银比/铜金比': 0.05,
            '经济不确定性 (EPU)': 0.01
        };

        async function loadData() {
            document.getElementById('loadingSection').classList.remove('hidden');
            document.getElementById('contentSection').classList.add('hidden');
            
            try {
                // 动态获取当前主机和端口
                const baseUrl = window.location.origin;
                const response = await fetch(`${baseUrl}/api/macro-factors`);
                const data = await response.json();
                
                currentData = data;
                // 保存从服务器获取的默认权重
                for (const [name, factor] of Object.entries(data.factors)) {
                    defaultWeights[name] = factor.weight || 0;
                }
                customWeights = {...defaultWeights};
                
                updateUI(data);
                initWeightSliders(data.factors);
                
                document.getElementById('loadingSection').classList.add('hidden');
                document.getElementById('contentSection').classList.remove('hidden');
            } catch (error) {
                console.error('加载数据失败:', error);
                alert('数据加载失败，请重试');
            }
        }
        
        function toggleWeightPanel() {
            const panel = document.getElementById('weightPanel');
            panel.classList.toggle('hidden');
        }
        
        function initWeightSliders(factors) {
            const container = document.getElementById('weightSliders');
            container.innerHTML = '';
            
            // 按权重降序排列
            const sortedFactors = Object.entries(factors).sort((a, b) => b[1].weight - a[1].weight);
            
            for (const [name, factor] of sortedFactors) {
                const weight = factor.weight || 0;
                const item = document.createElement('div');
                item.className = 'weight-item';
                item.innerHTML = `
                    <div class="weight-item-header">
                        <span class="weight-item-name">${name}</span>
                        <span class="weight-item-value" id="weight-value-${name}">${(weight * 100).toFixed(0)}%</span>
                    </div>
                    <input type="range" class="weight-slider" min="0" max="50" value="${(weight * 100).toFixed(0)}"
                           id="weight-slider-${name}" oninput="updateWeight('${name}', this.value)">
                `;
                container.appendChild(item);
            }
            
            updateWeightTotal();
        }
        
        function updateWeight(name, value) {
            customWeights[name] = value / 100;
            document.getElementById(`weight-value-${name}`).textContent = value + '%';
            updateWeightTotal();
        }
        
        function updateWeightTotal() {
            const total = Object.values(customWeights).reduce((sum, w) => sum + w, 0);
            const totalEl = document.getElementById('weightTotal');
            totalEl.textContent = `总计: ${(total * 100).toFixed(1)}%`;
            
            if (Math.abs(total - 1.0) > 0.01) {
                totalEl.classList.add('warning');
                totalEl.textContent += ' (应为100%)';
            } else {
                totalEl.classList.remove('warning');
            }
        }
        
        function applyCustomWeights() {
            if (!currentData) {
                alert('请先获取数据');
                return;
            }
            
            // 检查权重总和
            const totalWeight = Object.values(customWeights).reduce((sum, w) => sum + w, 0);
            if (Math.abs(totalWeight - 1.0) > 0.01) {
                alert(`权重总和必须是100%，当前为 ${(totalWeight * 100).toFixed(1)}%`);
                return;
            }
            
            // 重新计算加权得分
            let totalScore = 0;
            const updatedFactors = {};
            
            for (const [name, factor] of Object.entries(currentData.factors)) {
                const newWeight = customWeights[name] || factor.weight || 0;
                const adjustedScore = factor.adjusted_score || 0;
                const newWeightedScore = adjustedScore * newWeight;
                
                updatedFactors[name] = {
                    ...factor,
                    weight: newWeight,
                    weighted_score: newWeightedScore
                };
                totalScore += newWeightedScore;
            }
            
            // 更新情绪判断
            let newSentiment, expectedChange;
            if (totalScore > 6.5) {
                newSentiment = '强烈看涨';
                expectedChange = 0.055;
            } else if (totalScore > 5.5) {
                newSentiment = '看涨';
                expectedChange = 0.02;
            } else if (totalScore > 4.5) {
                newSentiment = '中性';
                expectedChange = 0.0;
            } else if (totalScore > 3.5) {
                newSentiment = '看跌';
                expectedChange = -0.02;
            } else {
                newSentiment = '强烈看跌';
                expectedChange = -0.055;
            }
            
            // 基于新的综合得分重新计算预测价格
            const currentPrice = (currentData.prediction && currentData.prediction.current_price) || 0;
            const dailyDrift = expectedChange / 30;
            const dailyVolatility = 0.15 / Math.sqrt(252); // 默认15%年化波动率
            
            const newPredictions = [];
            const newDates = [];
            let currentPred = currentPrice;
            
            // 使用原始数据的起始日期，或今天
            const baseDate = (currentData.prediction && currentData.prediction.dates && currentData.prediction.dates.length > 0)
                ? new Date(currentData.prediction.dates[0]) 
                : new Date();
            
            for (let i = 0; i < 30; i++) {
                const date = new Date(baseDate);
                date.setDate(baseDate.getDate() + i);
                newDates.push(date.toISOString().split('T')[0]);
                
                // 随机游走: r = drift + volatility * Z
                const randomShock = (Math.random() - 0.5) * 2 * dailyVolatility;
                const dailyReturn = dailyDrift + randomShock;
                currentPred = currentPred * (1 + dailyReturn);
                newPredictions.push(Math.round(currentPred * 100) / 100);
            }
            
            const targetPrice = Math.round(currentPrice * (1 + expectedChange) * 100) / 100;
            
            // 更新预测数据
            const newPrediction = {
                ...currentData.prediction,
                predictions: newPredictions,
                dates: newDates,
                sentiment: newSentiment,
                expected_return: Math.round(expectedChange * 100 * 10) / 10,
                target_price: targetPrice
            };
            
            // 更新UI
            const updatedData = {
                ...currentData,
                factors: updatedFactors,
                total_score: totalScore,
                sentiment: newSentiment,
                prediction: newPrediction
            };
            
            updateUI(updatedData);
            
            // 显示成功提示
            const panel = document.getElementById('weightPanel');
            const successMsg = document.createElement('div');
            successMsg.style.cssText = 'text-align:center; color:#00d084; margin-top:10px; padding:10px; background:rgba(0,208,132,0.1); border-radius:8px;';
            successMsg.innerHTML = `✓ 权重已应用<br>新综合得分: ${totalScore.toFixed(2)} | 预期收益: ${(expectedChange * 100).toFixed(1)}%`;
            panel.appendChild(successMsg);
            
            setTimeout(() => {
                successMsg.remove();
            }, 3000);
        }
        
        function resetWeights() {
            customWeights = {...defaultWeights};
            
            // 重置所有滑块
            for (const [name, weight] of Object.entries(defaultWeights)) {
                const slider = document.getElementById(`weight-slider-${name}`);
                const valueEl = document.getElementById(`weight-value-${name}`);
                if (slider) slider.value = (weight * 100).toFixed(0);
                if (valueEl) valueEl.textContent = (weight * 100).toFixed(0) + '%';
            }
            
            updateWeightTotal();
            
            // 恢复原始数据
            if (currentData) {
                updateUI(currentData);
            }
        }

        function updateUI(data) {
            // 更新总分
            const totalScore = data.total_score || 0;
            document.getElementById('totalScore').textContent = totalScore.toFixed(2);
            document.getElementById('updateTime').textContent = data.update_time || '--';
            
            // 更新情绪标签
            const sentimentEl = document.getElementById('sentiment');
            sentimentEl.textContent = data.sentiment;
            sentimentEl.className = 'sentiment';
            if (data.sentiment.includes('强烈看涨') || data.sentiment.includes('看涨')) {
                sentimentEl.classList.add('bullish');
            } else if (data.sentiment.includes('强烈看跌') || data.sentiment.includes('看跌')) {
                sentimentEl.classList.add('bearish');
            } else {
                sentimentEl.classList.add('neutral');
            }
            
            // 更新因子卡片
            const grid = document.getElementById('factorsGrid');
            grid.innerHTML = '';
            
            for (const [name, factor] of Object.entries(data.factors)) {
                const card = document.createElement('div');
                card.className = 'factor-card';
                
                // 处理可能为 null 的值，提供默认值
                const impact = factor.impact || 'positive';
                const trend = factor.trend || 'stable';
                const weight = factor.weight || 0;
                const baseScore = factor.base_score || 0;
                const adjustedScore = factor.adjusted_score || 0;
                const weightedScore = factor.weighted_score || 0;
                const change1m = factor.change_1m || 0;
                
                const impactClass = impact === 'positive' ? 'positive' : 'negative';
                const impactText = impact === 'positive' ? '正向' : '负向';
                const trendIcon = trend === 'up' ? '↗' : (trend === 'down' ? '↘' : '→');
                const trendColor = trend === 'up' ? '#00d084' : (trend === 'down' ? '#ff4757' : '#888');
                const trendText = trend === 'up' ? '上升' : (trend === 'down' ? '下降' : '平稳');
                
                card.innerHTML = `
                    <div class="factor-header">
                        <div class="factor-name">
                            ${name}
                            <span class="impact-tag ${impactClass}">${impactText}</span>
                        </div>
                        <div class="factor-weight">权重 ${(weight * 100).toFixed(0)}%</div>
                    </div>
                    <div class="factor-value">
                        ${factor.raw_value && typeof factor.raw_value === 'object' ? 
                            `${factor.raw_value.gold_silver || '--'} / ${factor.raw_value.copper_gold || '--'}` : 
                            (factor.raw_value || '--')}
                    </div>
                    <div class="factor-details">
                        <div class="factor-detail">
                            原始得分
                            <span>${baseScore.toFixed(2)}</span>
                        </div>
                        <div class="factor-detail">
                            调整后
                            <span style="color: ${adjustedScore > 5 ? '#00d084' : '#ff4757'}">${adjustedScore.toFixed(2)}</span>
                        </div>
                        <div class="factor-detail">
                            加权得分
                            <span style="color: #FFD700">${weightedScore.toFixed(3)}</span>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${adjustedScore > 5 ? 'positive' : 'negative'}" 
                             style="width: ${Math.min(adjustedScore * 10, 100)}%"></div>
                    </div>
                    <div style="margin-top: 8px; font-size: 12px; color: #666;">
                        月度变化: <span style="color: ${change1m > 0 ? '#00d084' : '#ff4757'}">
                            ${change1m > 0 ? '+' : ''}${change1m.toFixed(2)}
                        </span>
                        <span style="margin-left: 15px; color: ${trendColor}">${trendIcon} ${trendText}</span>
                    </div>
                `;
                grid.appendChild(card);
            }
            
            // 更新预测
            const pred = data.prediction || {};
            const currentPrice = pred.current_price || 0;
            const targetPrice = pred.target_price || 0;
            document.getElementById('currentPrice').textContent = '¥' + (currentPrice ? currentPrice.toLocaleString() : '--');
            document.getElementById('targetPrice').textContent = '¥' + (targetPrice ? targetPrice.toLocaleString() : '--');
            
            // 更新价格来源
            const priceSourceEl = document.getElementById('priceSource');
            if (pred.current_price_source && pred.current_price_contract) {
                priceSourceEl.textContent = `${pred.current_price_source} ${pred.current_price_contract}`;
                priceSourceEl.style.color = '#FFD700';
            } else {
                priceSourceEl.textContent = '上海期货交易所 AU2604';
            }
            
            const returnEl = document.getElementById('expectedReturn');
            const expectedReturn = pred.expected_return || 0;
            returnEl.textContent = (expectedReturn > 0 ? '+' : '') + expectedReturn + '%';
            returnEl.style.color = expectedReturn > 0 ? '#00d084' : '#ff4757';
            
            const predictions = pred.predictions || [];
            let priceRangeText = '--';
            if (predictions.length > 0) {
                const minPrice = Math.min(...predictions);
                const maxPrice = Math.max(...predictions);
                priceRangeText = '¥' + minPrice.toFixed(0) + ' - ¥' + maxPrice.toFixed(0);
            }
            document.getElementById('priceRange').textContent = priceRangeText;
            
            // 绘制图表
            drawChart(pred.dates || [], predictions, currentPrice);
        }

        function drawChart(dates, predictions, currentPrice) {
            const ctx = document.getElementById('predictionChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }
            
            // 处理空数据情况
            if (!dates || dates.length === 0 || !predictions || predictions.length === 0) {
                console.warn('No data available for chart');
                return;
            }
            
            // 添加当前价格作为起点
            // 确保日期和价格数组长度一致
            const filteredIndices = dates.map((_, i) => i).filter(i => i % 5 === 0);
            const filteredDates = filteredIndices.map(i => dates[i]);
            const filteredPrices = filteredIndices.map(i => predictions[i]);
            
            const allDates = ['当前', ...filteredDates];
            const allPrices = [currentPrice, ...filteredPrices];
            
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: allDates,
                    datasets: [{
                        label: '金价预测',
                        data: allPrices,
                        borderColor: '#FFD700',
                        backgroundColor: 'rgba(255,215,0,0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: '#FFD700'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#888' }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: {
                                color: '#888',
                                callback: function(value) {
                                    return '¥' + value;
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
