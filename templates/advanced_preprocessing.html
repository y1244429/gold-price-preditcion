<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金价格高级预测 - 数据预处理与特征工程</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid rgba(255,215,0,0.3);
            margin-bottom: 30px;
        }
        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        }
        
        .section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 20px;
            color: #FFD700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .metric-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .metric-label { color: #888; font-size: 12px; margin-bottom: 8px; }
        .metric-value { font-size: 24px; font-weight: bold; color: #FFD700; }
        
        .hurst-display {
            text-align: center;
            padding: 30px;
            background: rgba(255,215,0,0.05);
            border-radius: 15px;
            margin: 20px 0;
        }
        .hurst-value {
            font-size: 64px;
            font-weight: bold;
            color: #FFD700;
        }
        .hurst-label { color: #888; margin-top: 10px; }
        
        .feature-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px;
        }
        .feature-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        .feature-name { color: #fff; }
        .feature-importance { color: #FFD700; font-weight: bold; }
        
        .chart-container {
            height: 400px;
            margin-top: 20px;
        }
        
        .process-flow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .process-step {
            text-align: center;
            flex: 1;
        }
        .process-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .process-name { font-size: 14px; color: #FFD700; }
        .process-arrow {
            color: #FFD700;
            font-size: 24px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,215,0,0.2);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔬 黄金价格高级预测系统</h1>
            <p style="color:#888; margin-top:10px;">EEMD降噪 + Hurst指数 + 小波变换 + 多维度特征工程</p>
        </header>

        <button class="btn" onclick="runPrediction()">🚀 运行高级预测</button>

        <div id="loadingSection" class="loading hidden">
            <div class="spinner"></div>
            <p style="color:#888;">正在进行数据预处理和特征工程...</p>
        </div>

        <div id="resultsSection" class="hidden">
            <!-- 处理流程 -->
            <div class="section">
                <div class="section-title">⚙️ 数据预处理流程</div>
                <div class="process-flow">
                    <div class="process-step">
                        <div class="process-icon">📊</div>
                        <div class="process-name">原始数据</div>
                    </div>
                    <div class="process-arrow">→</div>
                    <div class="process-step">
                        <div class="process-icon">🔍</div>
                        <div class="process-name">EEMD分解</div>
                    </div>
                    <div class="process-arrow">→</div>
                    <div class="process-step">
                        <div class="process-icon">📡</div>
                        <div class="process-name">小波降噪</div>
                    </div>
                    <div class="process-arrow">→</div>
                    <div class="process-step">
                        <div class="process-icon">🎯</div>
                        <div class="process-name">卡尔曼滤波</div>
                    </div>
                    <div class="process-arrow">→</div>
                    <div class="process-step">
                        <div class="process-icon">✨</div>
                        <div class="process-name">降噪数据</div>
                    </div>
                </div>
            </div>

            <!-- Hurst指数 -->
            <div class="section">
                <div class="section-title">📈 Hurst指数分析</div>
                <div class="hurst-display">
                    <div class="hurst-value" id="hurstValue">--</div>
                    <div class="hurst-label">Hurst指数 (长期记忆性)</div>
                </div>
                <div class="metric-grid" id="hurstInfo">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 模型性能 -->
            <div class="section">
                <div class="section-title">🎯 模型性能指标</div>
                <div class="metric-grid">
                    <div class="metric-card">
                        <div class="metric-label">R² 决定系数</div>
                        <div class="metric-value" id="r2Score">--</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">RMSE 均方根误差</div>
                        <div class="metric-value" id="rmseScore">--</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">当前金价</div>
                        <div class="metric-value" id="currentPrice">--</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">30天预测均价</div>
                        <div class="metric-value" id="avgPrediction">--</div>
                    </div>
                </div>
            </div>

            <!-- 特征重要性 -->
            <div class="section">
                <div class="section-title">🔑 Top 10 重要特征</div>
                <div class="feature-list" id="featureList">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 预测图表 -->
            <div class="section">
                <div class="section-title">📊 30天价格预测</div>
                <div class="chart-container">
                    <canvas id="predictionChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartInstance = null;

        async function runPrediction() {
            document.getElementById('loadingSection').classList.remove('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            
            try {
                const response = await fetch('/api/predict');
                const data = await response.json();
                
                updateUI(data);
                
                document.getElementById('loadingSection').classList.add('hidden');
                document.getElementById('resultsSection').classList.remove('hidden');
            } catch (error) {
                console.error('预测失败:', error);
                alert('预测失败，请重试');
            }
        }

        function updateUI(data) {
            // Hurst指数
            document.getElementById('hurstValue').textContent = data.hurst;
            
            const hurstInfo = document.getElementById('hurstInfo');
            hurstInfo.innerHTML = `
                <div class="metric-card">
                    <div class="metric-label">交易策略</div>
                    <div class="metric-value" style="font-size: 18px;">${data.strategy.strategy}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">策略描述</div>
                    <div class="metric-value" style="font-size: 14px;">${data.strategy.description}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">持仓周期</div>
                    <div class="metric-value">${data.strategy.holding_period}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">置信度</div>
                    <div class="metric-value">${data.strategy.confidence}</div>
                </div>
            `;
            
            // 模型性能
            document.getElementById('r2Score').textContent = data.metrics.R2.toFixed(4);
            document.getElementById('rmseScore').textContent = '¥' + data.metrics.RMSE.toFixed(2);
            document.getElementById('currentPrice').textContent = '¥' + data.current_price.toLocaleString();
            
            const avgPred = data.predictions.reduce((a, b) => a + b, 0) / data.predictions.length;
            document.getElementById('avgPrediction').textContent = '¥' + avgPred.toFixed(0);
            
            // 特征重要性
            const featureList = document.getElementById('featureList');
            featureList.innerHTML = '';
            data.top_features.forEach(([name, importance]) => {
                const item = document.createElement('div');
                item.className = 'feature-item';
                item.innerHTML = `
                    <span class="feature-name">${name}</span>
                    <span class="feature-importance">${(importance * 100).toFixed(1)}%</span>
                `;
                featureList.appendChild(item);
            });
            
            // 绘制图表
            drawChart(data.dates, data.predictions, data.current_price);
        }

        function drawChart(dates, predictions, currentPrice) {
            const ctx = document.getElementById('predictionChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }
            
            // 抽样显示
            const sampleDates = dates.filter((_, i) => i % 3 === 0);
            const samplePreds = predictions.filter((_, i) => i % 3 === 0);
            
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sampleDates,
                    datasets: [{
                        label: '预测价格',
                        data: samplePreds,
                        borderColor: '#FFD700',
                        backgroundColor: 'rgba(255,215,0,0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: '#FFD700'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#888' }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: {
                                color: '#888',
                                callback: function(value) {
                                    return '¥' + value;
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
