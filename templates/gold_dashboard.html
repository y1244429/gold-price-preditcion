<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金价格预测 - 实时数据</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid rgba(255,215,0,0.3);
            margin-bottom: 30px;
        }
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            background: rgba(0,208,132,0.2);
            color: #00d084;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(0,208,132,0.3);
        }
        
        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }
        .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-btn:hover, .nav-btn.active {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            border-color: transparent;
        }
        
        .price-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,165,0,0.05));
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
        }
        .price-label { color: #888; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
        .price-value {
            font-size: 56px;
            font-weight: bold;
            color: #FFD700;
            margin: 15px 0;
        }
        .price-change { font-size: 20px; margin-top: 10px; }
        .up { color: #00d084; }
        .down { color: #ff4757; }
        .update-time { color: #666; font-size: 13px; margin-top: 15px; }
        
        .btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,215,0,0.3);
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s;
        }
        .metric-card:hover {
            border-color: rgba(255,215,0,0.3);
            transform: translateY(-5px);
        }
        .metric-title { color: #888; font-size: 14px; margin-bottom: 10px; }
        .metric-value { font-size: 32px; font-weight: bold; color: #FFD700; }
        .metric-sub { font-size: 13px; color: #666; margin-top: 8px; }
        
        .chart-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            height: 320px;
        }
        .chart-title { 
            font-size: 18px; 
            margin-bottom: 20px; 
            color: #FFD700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .forecast-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .forecast-table th, .forecast-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .forecast-table th {
            background: rgba(255,215,0,0.1);
            color: #FFD700;
            font-weight: 600;
            font-size: 13px;
        }
        .forecast-table tr:hover { background: rgba(255,255,255,0.03); }
        .highlight { 
            color: #FFD700; 
            font-weight: bold;
            font-size: 18px;
        }
        
        /* 宏观因子样式 */
        .macro-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .macro-score-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,165,0,0.05));
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
        }
        .macro-score-value {
            font-size: 56px;
            font-weight: bold;
            color: #FFD700;
        }
        .macro-score-label {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
        }
        .factors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 15px;
        }
        .factor-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        .factor-card:hover {
            border-color: rgba(255,215,0,0.3);
            transform: translateY(-3px);
        }
        .factor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .factor-name {
            font-size: 15px;
            font-weight: 600;
        }
        .factor-weight {
            background: rgba(255,215,0,0.1);
            color: #FFD700;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        .factor-value {
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 10px;
        }
        .factor-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            font-size: 12px;
            color: #888;
        }
        .factor-detail {
            text-align: center;
        }
        .factor-detail span {
            display: block;
            color: #fff;
            font-size: 14px;
            margin-top: 4px;
        }
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .progress-fill.positive {
            background: linear-gradient(90deg, #00d084, #00b894);
        }
        .progress-fill.negative {
            background: linear-gradient(90deg, #ff4757, #ee5a6f);
        }
        .impact-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 8px;
        }
        .impact-tag.positive {
            background: rgba(0,208,132,0.2);
            color: #00d084;
        }
        .impact-tag.negative {
            background: rgba(255,71,87,0.2);
            color: #ff4757;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,215,0,0.2);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🪙 黄金价格预测系统</h1>
                <p style="color:#888; margin-top:5px;">基于真实市场数据的机器学习预测</p>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <span class="badge" id="dataSource">● 实时数据</span>
            </div>
        </header>

        <!-- 导航按钮 -->
        <div class="nav-buttons">
            <button class="nav-btn active" onclick="showPage('price')">📈 价格预测</button>
            <button class="nav-btn" onclick="showPage('macro')">🌍 宏观预测</button>
            <button class="nav-btn" onclick="window.open('/macro', '_blank')">⚙️ 黄金价格宏观因子可调整预测系统</button>
        </div>

        <!-- 价格预测页面 -->
        <div id="pricePage">
            <div id="loadingSection" class="loading">
                <div class="spinner"></div>
                <p style="color:#888;">正在加载数据...</p>
            </div>

            <div id="contentSection" class="hidden">
                <div class="price-card">
                    <div class="price-label">上期所主力合约 AU2604 (RMB/克)</div>
                    <div class="price-value" id="currentPrice">--</div>
                    <div class="price-change" id="priceChange">--</div>
                    <p class="update-time">数据更新时间: <span id="updateTime">--</span></p>
                    <button class="btn" onclick="refreshData()" style="margin-top: 20px;">🔄 刷新数据</button>
                </div>

                <div class="metrics" id="metricsSection">
                    <!-- 动态生成 -->
                </div>

                <div class="chart-container">
                    <div class="chart-title">📈 历史价格走势与预测对比</div>
                    <canvas id="mainChart"></canvas>
                </div>

                <div class="chart-container">
                    <div class="chart-title">🔮 未来7天价格预测</div>
                    <table class="forecast-table">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>Linear Regression</th>
                                <th>Random Forest</th>
                                <th>ARIMA</th>
                                <th>XGBoost</th>
                                <th>LSTM</th>
                                <th class="highlight">加权集成</th>
                            </tr>
                        </thead>
                        <tbody id="forecastBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 宏观预测页面 -->
        <div id="macroPage" class="hidden">
            <div id="macroLoading" class="loading">
                <div class="spinner"></div>
                <p style="color:#888;">正在获取宏观因子数据...</p>
            </div>

            <div id="macroContent" class="hidden">
                <!-- 宏观得分 -->
                <div class="macro-score-card">
                    <div class="macro-score-label">宏观因子综合得分 (0-10)</div>
                    <div class="macro-score-value" id="macroTotalScore">--</div>
                    <div style="margin-top: 15px;">
                        <span id="macroSentiment" style="padding: 10px 25px; border-radius: 20px; font-weight: bold;">--</span>
                    </div>
                    <p style="color:#666; margin-top: 15px;">更新时间: <span id="macroUpdateTime">--</span></p>
                </div>

                <!-- 9个宏观因子 -->
                <div class="macro-section">
                    <div class="chart-title">📊 9个宏观因子详细分析</div>
                    <div class="factors-grid" id="factorsGrid">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 宏观预测结果 -->
                <div class="macro-section">
                    <div class="chart-title">📈 基于宏观因子的金价预测 (30天)</div>
                    <div class="metrics" style="margin-bottom: 20px;">
                        <div class="metric-card">
                            <div class="metric-title">当前金价</div>
                            <div class="metric-value" id="macroCurrentPrice">--</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-title">30天目标价</div>
                            <div class="metric-value" id="macroTargetPrice">--</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-title">预期收益率</div>
                            <div class="metric-value" id="macroExpectedReturn">--</div>
                        </div>
                    </div>
                    <div class="chart-container" style="height: 320px;">
                        <canvas id="macroChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let mainChart = null;
        let macroChart = null;

        // 页面切换
        function showPage(page) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (page === 'price') {
                document.getElementById('pricePage').classList.remove('hidden');
                document.getElementById('macroPage').classList.add('hidden');
                loadPriceData();
            } else {
                document.getElementById('pricePage').classList.add('hidden');
                document.getElementById('macroPage').classList.remove('hidden');
                loadMacroData();
            }
        }

        // 加载价格数据
        async function loadPriceData() {
            document.getElementById('loadingSection').classList.remove('hidden');
            document.getElementById('contentSection').classList.add('hidden');
            
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                // 检查是否有错误
                if (data.error) {
                    console.error('后端错误:', data.error);
                    alert('数据加载失败: ' + data.error);
                    return;
                }
                
                // 检查必要字段是否存在
                if (!data.current_price || !data.prices) {
                    console.error('数据格式错误:', data);
                    alert('数据格式错误，请查看控制台');
                    return;
                }
                
                updatePriceUI(data);
                document.getElementById('loadingSection').classList.add('hidden');
                document.getElementById('contentSection').classList.remove('hidden');
            } catch (error) {
                console.error('加载价格数据失败:', error);
                alert('加载失败: ' + error.message);
            }
        }

        // 加载宏观数据
        async function loadMacroData() {
            document.getElementById('macroLoading').classList.remove('hidden');
            document.getElementById('macroContent').classList.add('hidden');
            
            try {
                // 使用动态baseUrl确保端口正确
                const baseUrl = window.location.origin;
                const response = await fetch(`${baseUrl}/api/macro-factors`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                updateMacroUI(data);
                document.getElementById('macroLoading').classList.add('hidden');
                document.getElementById('macroContent').classList.remove('hidden');
            } catch (error) {
                console.error('加载宏观数据失败:', error);
                document.getElementById('macroLoading').innerHTML = `
                    <p style="color:#ff4757;">加载失败: ${error.message}</p>
                    <p style="color:#888; font-size:12px;">请确保服务已启动</p>
                `;
            }
        }

        function updatePriceUI(data) {
            // 安全获取数值
            const currentPrice = data.current_price || 0;
            const priceChange = data.price_change || 0;
            const priceChangePct = data.price_change_pct || 0;
            const updateTime = data.update_time || '未知';
            
            document.getElementById('currentPrice').textContent = '¥' + currentPrice.toLocaleString();
            document.getElementById('updateTime').textContent = updateTime;
            
            const changeEl = document.getElementById('priceChange');
            const isUp = priceChange >= 0;
            changeEl.className = `price-change ${isUp ? 'up' : 'down'}`;
            changeEl.innerHTML = `${isUp ? '+' : ''}${priceChange} (${isUp ? '+' : ''}${priceChangePct}%)`;
            
            // 更新数据源标识
            const sourceEl = document.getElementById('dataSource');
            if (data.data_source && data.data_source.includes('模拟')) {
                sourceEl.textContent = '● 模拟数据';
                sourceEl.style.background = 'rgba(255,71,87,0.2)';
                sourceEl.style.color = '#ff4757';
            } else if (data.data_source && data.data_source.includes('上海')) {
                sourceEl.textContent = '● 上期所 AU2604';
            }
            
            // 更新指标
            const metricsSection = document.getElementById('metricsSection');
            metricsSection.innerHTML = '';
            const colors = {
                'Random Forest': '#22c55e', 
                'Linear Regression': '#3b82f6', 
                'ARIMA': '#f59e0b', 
                'XGBoost': '#ef4444',
                'Gradient Boosting': '#f97316',
                'LSTM': '#a855f7',
                'Ensemble (Weighted)': '#FFD700'
            };
            for (const [model, metric] of Object.entries(data.metrics)) {
                if (model.startsWith('_')) continue; // 跳过内部字段
                const card = document.createElement('div');
                card.className = 'metric-card';
                card.innerHTML = `
                    <div class="metric-title">${model}</div>
                    <div class="metric-value" style="color: ${colors[model] || '#FFD700'}">${metric.R2.toFixed(4)}</div>
                    <div class="metric-sub">RMSE: ¥${metric.RMSE.toFixed(2)}</div>
                `;
                metricsSection.appendChild(card);
            }
            
            // 更新预测表格
            const tbody = document.getElementById('forecastBody');
            tbody.innerHTML = '';
            for (let i = 0; i < data.future_dates.length; i++) {
                const lr = data.future_predictions['Linear Regression'][i];
                const rf = data.future_predictions['Random Forest'][i];
                const arima = data.future_predictions['ARIMA'][i];
                // XGBoost可能不存在
                const xgb = data.future_predictions['XGBoost'] ? data.future_predictions['XGBoost'][i] : null;
                // LSTM可能不存在
                const lstm = data.future_predictions['LSTM'] ? data.future_predictions['LSTM'][i] : null;
                // 使用加权集成预测（如果存在）
                const ensemble = data.future_predictions['Ensemble (Weighted)'] ? 
                    data.future_predictions['Ensemble (Weighted)'][i] : 
                    (lr + rf + arima) / 3;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${data.future_dates[i]}</td>
                    <td style="color: #3b82f6">¥${lr.toFixed(2)}</td>
                    <td style="color: #22c55e">¥${rf.toFixed(2)}</td>
                    <td style="color: #f59e0b">¥${arima.toFixed(2)}</td>
                    <td style="color: #ef4444">${xgb ? '¥' + xgb.toFixed(2) : '-'}</td>
                    <td style="color: #a855f7">${lstm ? '¥' + lstm.toFixed(2) : '-'}</td>
                    <td class="highlight">¥${ensemble.toFixed(2)}</td>
                `;
                tbody.appendChild(row);
            }
            
            // 绘制图表
            drawMainChart(data);
        }

        function updateMacroUI(data) {
            // 更新宏观得分
            document.getElementById('macroTotalScore').textContent = data.total_score.toFixed(2);
            document.getElementById('macroUpdateTime').textContent = data.update_time;
            
            const sentimentEl = document.getElementById('macroSentiment');
            sentimentEl.textContent = data.sentiment;
            if (data.sentiment.includes('看涨')) {
                sentimentEl.style.background = 'rgba(0,208,132,0.2)';
                sentimentEl.style.color = '#00d084';
            } else if (data.sentiment.includes('看跌')) {
                sentimentEl.style.background = 'rgba(255,71,87,0.2)';
                sentimentEl.style.color = '#ff4757';
            } else {
                sentimentEl.style.background = 'rgba(255,193,7,0.2)';
                sentimentEl.style.color = '#ffc107';
            }
            
            // 更新9个因子
            const factorsGrid = document.getElementById('factorsGrid');
            factorsGrid.innerHTML = '';
            
            for (const [name, factor] of Object.entries(data.factors)) {
                const card = document.createElement('div');
                card.className = 'factor-card';
                
                const impactClass = factor.impact === 'positive' ? 'positive' : 'negative';
                const impactText = factor.impact === 'positive' ? '正向' : '负向';
                const trendColor = factor.trend === 'up' ? '#00d084' : '#ff4757';
                
                card.innerHTML = `
                    <div class="factor-header">
                        <div class="factor-name">
                            ${name}
                            <span class="impact-tag ${impactClass}">${impactText}</span>
                        </div>
                        <div class="factor-weight">权重 ${(factor.weight * 100).toFixed(0)}%</div>
                    </div>
                    <div class="factor-value">
                        ${typeof factor.raw_value === 'object' ? 
                            `${factor.raw_value.gold_silver || '--'} / ${factor.raw_value.copper_gold || '--'}` : 
                            factor.raw_value}
                    </div>
                    <div class="factor-details">
                        <div class="factor-detail">
                            原始得分
                            <span>${factor.base_score.toFixed(1)}</span>
                        </div>
                        <div class="factor-detail">
                            调整后
                            <span style="color: ${factor.adjusted_score > 5 ? '#00d084' : '#ff4757'}">${factor.adjusted_score.toFixed(1)}</span>
                        </div>
                        <div class="factor-detail">
                            加权得分
                            <span style="color: #FFD700">${factor.weighted_score.toFixed(3)}</span>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${factor.adjusted_score > 5 ? 'positive' : 'negative'}" 
                             style="width: ${factor.adjusted_score * 10}%"></div>
                    </div>
                    <div style="margin-top: 8px; font-size: 11px; color: #666;">
                        月度变化: <span style="color: ${factor.change_1m > 0 ? '#00d084' : '#ff4757'}">
                            ${factor.change_1m > 0 ? '+' : ''}${factor.change_1m}
                        </span>
                        <span style="margin-left: 10px; color: ${trendColor}">${factor.trend === 'up' ? '↗' : '↘'} ${factor.trend === 'up' ? '上升' : '下降'}</span>
                    </div>
                `;
                factorsGrid.appendChild(card);
            }
            
            // 更新预测
            const pred = data.prediction;
            document.getElementById('macroCurrentPrice').textContent = '¥' + pred.current_price.toLocaleString();
            document.getElementById('macroTargetPrice').textContent = '¥' + pred.target_price.toLocaleString();
            
            const returnEl = document.getElementById('macroExpectedReturn');
            returnEl.textContent = (pred.expected_return > 0 ? '+' : '') + pred.expected_return + '%';
            returnEl.style.color = pred.expected_return > 0 ? '#00d084' : '#ff4757';
            
            // 绘制宏观预测图表
            drawMacroChart(pred.dates, pred.predictions, pred.current_price);
        }

        function drawMainChart(data) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (mainChart) mainChart.destroy();
            
            // 只显示最近15天历史数据 + 7天预测
            const historyDays = 15;
            const histDates = data.dates.slice(-historyDays);
            const histPrices = data.prices.slice(-historyDays);
            
            // 合并历史日期和预测日期
            const allDates = [...histDates, ...data.future_dates];
            
            // 构建数据集：历史数据 + null（预测位置）
            const histData = [...histPrices, ...new Array(data.future_dates.length).fill(null)];
            
            // 构建预测数据集：null（历史位置）+ 预测值（使用加权集成）
            const ensemblePreds = data.future_dates.map((_, i) => {
                // 优先使用加权集成预测
                if (data.future_predictions['Ensemble (Weighted)']) {
                    return data.future_predictions['Ensemble (Weighted)'][i];
                }
                // 备用：简单平均
                const lr = data.future_predictions['Linear Regression'][i];
                const rf = data.future_predictions['Random Forest'][i];
                const arima = data.future_predictions['ARIMA'][i];
                return (lr + rf + arima) / 3;
            });
            const predData = [...new Array(historyDays).fill(null), ...ensemblePreds];
            
            mainChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: allDates,
                    datasets: [
                        {
                            label: '历史价格',
                            data: histData,
                            borderColor: '#FFD700',
                            backgroundColor: 'rgba(255,215,0,0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 3
                        },
                        {
                            label: '预测价格',
                            data: predData,
                            borderColor: '#00d084',
                            backgroundColor: 'rgba(0,208,132,0.1)',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#00d084'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { 
                            labels: { color: '#aaa' },
                            position: 'top'
                        } 
                    },
                    scales: {
                        x: { 
                            grid: { color: 'rgba(255,255,255,0.1)' }, 
                            ticks: { color: '#888', maxRotation: 45, minRotation: 45 }
                        },
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.1)' }, 
                            ticks: { color: '#888', callback: v => '¥' + v }
                        }
                    }
                }
            });
        }

        function drawMacroChart(dates, predictions, currentPrice) {
            const ctx = document.getElementById('macroChart').getContext('2d');
            if (macroChart) macroChart.destroy();
            
            // 每3天取一个点，减少密度
            const sampleDates = dates.filter((_, i) => i % 3 === 0);
            const samplePreds = predictions.filter((_, i) => i % 3 === 0);
            
            macroChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sampleDates,
                    datasets: [{
                        label: '宏观预测',
                        data: samplePreds,
                        borderColor: '#FFD700',
                        backgroundColor: 'rgba(255,215,0,0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { 
                            grid: { color: 'rgba(255,255,255,0.1)' }, 
                            ticks: { color: '#888', maxRotation: 45, minRotation: 30 }
                        },
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.1)' }, 
                            ticks: { color: '#888', callback: v => '¥' + v }
                        }
                    }
                }
            });
        }

        async function refreshData() {
            await fetch('/api/refresh', { method: 'POST' });
            loadPriceData();
        }

        // 初始加载
        loadPriceData();
    </script>
</body>
</html>
